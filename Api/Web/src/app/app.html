<h1>Weather Forecasts</h1>

<button class="bg-sky-500 hover:bg-sky-700" (click)="fetch()">Fetch</button>

<p>ClickCount: {{count}}</p>

@for (forecast of forecasts; track forecast.date) {
    <div>
        <p>Date: {{forecast.date}}</p>
        <p>TemperatureC: {{forecast.temperatureC}}</p>
        <p>TemperatureF: {{forecast.temperatureF}}</p>
        <p>Summary: {{forecast.summary}}</p>
    </div>
} @empty {
    <p>No forecasts fetched.</p>
}

<router-outlet></router-outlet>
